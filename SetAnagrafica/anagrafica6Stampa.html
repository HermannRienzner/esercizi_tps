<html>
    <head>
        <title>
            local storage
        </title>
    </head>
    <body>
        <div style="display: flex; justify-content: space-between;">
            <div>
                <p>nome</p> <br>
                <p>cognome</p> <br>
                <p>e-mail</p> <br>
                <p>codice fiscale</p> <br>
                <p>indirizzo</p> <br>
                <p>città</p> <br>
                <p>CAP</p> <br>
                <p>anno di nascita</p> <br>
                <p>provincia</p> <br>
                <p>mezzi di trasporto</p> <br>
                <p>generazione</p> <br>
                <p>genere</p> <br>
                <p>materie</p> <br>
            </div>
            <div>
                <p id="nome"></p> <br>
                <p id="cognome"></p> <br>
                <p id="email"></p> <br>
                <p id="codiceFiscale"></p> <br>
                <p id="indirizzo"></p> <br>
                <p id="citta"></p> <br>
                <p id="CAP"></p> <br>
                <p id="comple"></p> <br>
                <p id="provincia"></p> <br>
                <p id="mezzo"></p> <br>
                <p id="generazione"></p> <br>
                <p id="genere"></p> <br>
                <p id="materie"></p> <br>
            </div>
        </div>
        <div>
        
            <a href="https://hermannrienzner.github.io/esercizi_tps/SetAnagrafica/SetAnagrafica/anagrafica6.html"> torna alla pagina precedente </a>

            <script>
                let collection = JSON.parse(localStorage.getItem("pacco"));
                document.getElementById("nome").innerHTML = "";
                document.getElementById("cognome").innerHTML = "";
                document.getElementById("email").innerHTML = "";
                document.getElementById("codiceFiscale").innerHTML = "";
                document.getElementById("genere").innerHTML = "";
                document.getElementById("provincia").innerHTML = "";
                document.getElementById("citta").innerHTML = "";
                document.getElementById("mezzo").innerHTML = "";
                document.getElementById("materie").innerHTML = "";
                document.getElementById("generazione").innerHTML = "";
                document.getElementById("comple").innerHTML = "";
                document.getElementById("CAP").innerHTML = "";
                document.getElementById("indirizzo").innerHTML = "";

                for(let i = 0; i < collection.length; i++){
                    document.getElementById("nome").innerHTML += collection[i].nome + ", ";
                    document.getElementById("cognome").innerHTML += collection[i].cognome + ", ";
                    document.getElementById("email").innerHTML += collection[i].email + ", ";
                    document.getElementById("codiceFiscale").innerHTML += collection[i].codiceFiscale + ", ";
                    document.getElementById("genere").innerHTML += collection[i].genere + ", ";
                    document.getElementById("provincia").innerHTML += collection[i].provincia + ", ";
                    document.getElementById("citta").innerHTML += collection[i].citta + ", ";
                    document.getElementById("mezzo").innerHTML += collection[i].mezzo + ", ";
                    document.getElementById("materie").innerHTML += collection[i].materia + ", ";
                    document.getElementById("generazione").innerHTML += collection[i].generazione + ", ";
                    document.getElementById("comple").innerHTML += collection[i].compleanno + ", ";
                    document.getElementById("CAP").innerHTML += collection[i].cap + ", ";
                    document.getElementById("indirizzo").innerHTML += collection[i].indirizzo + ", ";
                }  
            </script>
        </div>
    </body>
</html>
