<html>
    <head>

    </head>
    <body>
        <div class="spostamento">
          <a href="https://hermannrienzner.github.io/esercizi_tps/Ecommerce/home.html">Home</a>
          <a href="https://hermannrienzner.github.io/esercizi_tps/Ecommerce/registrazione.html">Registrazione</a>
          <a href="https://hermannrienzner.github.io/esercizi_tps/Ecommerce/carrello.html">Carrello</a>
          <a href="https://hermannrienzner.github.io/esercizi_tps/Ecommerce/assistenza.html">Assistenza</a>
          <a href="https://hermannrienzner.github.io/esercizi_tps/Ecommerce/cronologia.html">Cronologia ordini</a>
        </div>
        
        <div id="dettagli">
        <input type="button" id="aggiungi" onclick="aggiungi()">
        </div>
        
        <script>
            let dati = JSON.parse(localStorage.getItem("info"));
            let immagine = document.createElement("img");
            immagine.src = dati[3];

            document.getElementById("dettagli").appendChild(immagine);

            for(let i = 0; i < 5; i++){
            
                let p = document.createElement("p");
                
                if(i != 3){
                    p.textContent = dati[i];
                    document.getElementById("dettagli").appendChild(p);
                }
            }

            function aggiungi (){
                if(JSON.parse(localStorage.getItem("carrello")) == null){
                    let carrello = [];
                    carrello.push(dati);
                    localStorage.setItem(carrello, JSON.stringify(carrello));
                }
                else{
                    let carrello = JSON.parse(localStorage.getItem("carrello"));
                    carrello.push(dati);
                    localStorage.setItem(carrello, JSON.stringify(carrello));
                }
            }

        </script>
    </body>
</html>
