<html>
  <head>
    <title>Home page</title>
  </head>
  <link rel="stylesheet" href="Ecommerce.css" />
  <body>
    <div class="spostamento">
      <a href="https://hermannrienzner.github.io/esercizi_tps/Ecommerce/home.html">Home</a>
      <a href="https://hermannrienzner.github.io/esercizi_tps/Ecommerce/registrazione.html">Registrazione</a>
      <a href="https://hermannrienzner.github.io/esercizi_tps/Ecommerce/carrello.html">Carrello</a>
      <a href="https://hermannrienzner.github.io/esercizi_tps/Ecommerce/assistenza.html">Assistenza</a>
      <a href="https://hermannrienzner.github.io/esercizi_tps/Ecommerce/cronologia.html">Cronologia ordini</a>
    </div>
    <div>
      <p id="risultato file"> </p>
    </div>

    <div id="prodotti"></div>
    <script>

      async function leggiCSV() {
        const response = await fetch("https://raw.githubusercontent.com/HermannRienzner/esercizi_tps/main/Ecommerce/prodotti.csv");

        const testo = await response.text();

        console.log(testo);

        const matrice = testo.trim().split(/\r?\n/).map(riga => riga.split(","));
        
        return matrice;
      }

      window.onload = async function(){
        dati = await leggiCSV();
      }

      console.log(dati);
      
      for(let i = 1; i < dati.length; i++){
        const divprodotti = document.createElement("div");
        
        const textprodotti = document.createElement("p");
        textprodotti.textContent = dati[i][0] + "\n" + dati[i][2] + "\n" + dati[i][4];
        
        const imgprodotti = document.createElement("img");
        imgprodotti.src = dati[i][3];

        divprodotti.appendChild(imgprodotti);
        divprodotti.appendChild(textprodotti);

        document.getElementById("prodotti").appendChild(divprodotti);
      }
    </script>
  </body>
</html>
