    <table id="outputcarrello"

    </table>

    <script>
      window.onload = function creapagina(){
        let table = document.getElementById("outputcarrello");
        let comprati = JSON.parse(localStorage.getItem("comprati"));

        for(let i = 0; i < comprati.length; i++){
            let tr = document.createElement("tr");
            
            for(let j = 0; j < comprati[i].length + 1; j ++){
              
              let td = document.createElement("td");

              if(j != 3 && j < comprati[i].length){
                td.textContent = comprati[i][j];
              }   

              tr.appendChild(td);
              
            }

            table.appendChild(tr); 
          }    
      }
    </script>
  </body>
