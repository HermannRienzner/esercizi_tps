<html>
  <head>
    <title>
      Carrello
    </title>
  </head>
  <link rel="stylesheet" href="carrello.css" />
  <body>
    <div class="spostamento">
      <a href="home.html">Home</a>
      <a href="registrazione.html">Registrazione</a>
      <a href="carrello.html">Carrello</a>
      <a href="assistenza.html">Assistenza</a>
      <a href="cronologia.html">Cronologia ordini</a>
    </div>
    <table id="outputcarrello">

    </table>
    <div id="compracarrello"></div>

    </div>
    <script>
      window.onload = function () {
        creapagina();
      }

      function creapagina(){
        let carrello = JSON.parse(localStorage.getItem("carrello"));
        let table = document.getElementById("outputcarrello");
        table.innerHTML = "";
        
        if(carrello != null){

          for(let i = 0; i < carrello.length; i++){
            let tr = document.createElement("tr");
            let tdimg = document.createElement("td");
            let immagine = document.createElement("img");

            immagine.src = carrello[i][3];
            tdimg.appendChild(immagine);
            tr.appendChild(tdimg);
            
            for(let j = 0; j < carrello[i].length + 1; j ++){
              let td = document.createElement("td");
              
              if(j != 3 && j < carrello[i].length){
                td.textContent = carrello[i][j];
                tr.appendChild(td);
              }   
              if(j == carrello[i].length){
                let cancella = document.createElement("button");
                cancella.textContent = "rimuovi dal carrello";
                cancella.value = i;
                cancella.className = "cancella";
                cancella.addEventListener("click", () => interagisciprodotto(cancella.value, ""));
                td.appendChild(cancella);

                let compra = document.createElement("button");
                compra.textContent = "aquista";
                compra.value = i;
                compra.className = "compra";
                compra.addEventListener("click", () => interagisciprodotto(compra.value, "compra"));
                td.appendChild(compra);

                tr.appendChild(td)
              }
            }

            table.appendChild(tr); 
          }     
          if(carrello.length >= 1){
            let div = document.getElementById("compracarrello");
            div.innerHTML = "";
            let compratutto = document.createElement("button");
            compratutto.textContent = "aquista carrello";
            compratutto.id = "compratutto";
            
            compratutto.addEventListener("click", function (){
              for(let k = 0; k < carrello.length; k ++){
                interagisciprodotto(0, "compra");
              }
            })

            div.appendChild(compratutto);

          }
          else{
            let div = document.getElementById("compracarrello");
            div.innerHTML = "";   
            div.textContent = "il carrello è vuoto";         
          }
        }
      }

      function interagisciprodotto(indice, comando){
        let carrello = JSON.parse(localStorage.getItem("carrello"));

        if(comando == "compra"){
          let comprati = JSON.parse(localStorage.getItem("comprati")) || [];
          comprati.push(carrello[indice]);
          localStorage.setItem("comprati", JSON.stringify(comprati));
        }

        carrello.splice(indice, 1);

        localStorage.setItem("carrello", JSON.stringify(carrello));

        creapagina();

      };
    </script>
  </body>
</html>
